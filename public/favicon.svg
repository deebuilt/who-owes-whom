<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a9e7f"/>
      <stop offset="100%" stop-color="#3a7a5a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Dollar sign -->
  <text x="256" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="220" font-weight="700" fill="white">$</text>
  <!-- People dots arranged in a circle -->
  <!-- Top -->
  <circle cx="256" cy="62" r="30" fill="white" opacity="0.9"/>
  <!-- Top-right -->
  <circle cx="393" cy="119" r="26" fill="white" opacity="0.75"/>
  <!-- Right -->
  <circle cx="450" cy="256" r="24" fill="white" opacity="0.6"/>
  <!-- Bottom-right -->
  <circle cx="393" cy="393" r="26" fill="white" opacity="0.75"/>
  <!-- Bottom -->
  <circle cx="256" cy="450" r="30" fill="white" opacity="0.9"/>
  <!-- Bottom-left -->
  <circle cx="119" cy="393" r="26" fill="white" opacity="0.75"/>
  <!-- Left -->
  <circle cx="62" cy="256" r="24" fill="white" opacity="0.6"/>
  <!-- Top-left -->
  <circle cx="119" cy="119" r="26" fill="white" opacity="0.75"/>
</svg>
